<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>suzukiのサイト</title>
    <style>
        body { background: #121212; color: #fff; text-align: center; font-family: sans-serif; }
        #main-content { display: none; }
        .box { padding: 50px; }
        input { padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen" class="box">
        <h2>パスワードを入力</h2>
        <input type="password" id="pass">
        <button onclick="check()">ログイン</button>
    </div>

    <div id="main-content" class="box">
        <h1>suzukiのサイト</h1>
        <p>ログイン成功しました。</p>
        <img src="latest_print.png" alt="プリント">
    </div>

    <script>
        function check() {
            if (document.getElementById("pass").value === "suzuki2026") {
                document.cookie = "auth=ok; max-age=86400; path=/";
                show();
            } else { alert("パスワードが違います"); }
        }
        function show() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-content").style.display = "block";
        }
        if (document.cookie.includes("auth=ok")) show();
    </script>
</body>
</html>
